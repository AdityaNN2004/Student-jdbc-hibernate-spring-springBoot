spring.application.name=Student

spring.datasource.url=jdbc:mysql://localhost:3306/studentdb
spring.datasource.username=D5-92644-Aditya
spring.datasource.password=manager
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# This automatically updates your database tables based on your Java entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
# 1. Root logging level context framework fallback
logging.level.root=INFO

# 2. Enable deep tracking logs for your custom application package
level.com.studentSpringBoot=DEBUG

# 3. Enable Hibernate SQL parameter binding visibility
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.results=TRACE

# 4. Optional: Save logs to a physical file in your project directory
logging.file.name=logs/student_management.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Amazon S3 Infrastructure Profiles
aws.access.key.id=${AWS_ACCESS_KEY_ID}
aws.secret.access.key=${AWS_SECRET_ACCESS_KEY}

aws.s3.region=ap-south-1
aws.s3.bucket-name=my-springboot-app-storage
